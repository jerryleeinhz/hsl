<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSL Ticket Mockup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-screen" aria-label="HSL ticket app mockup">
        <nav class="ticket-tabs" aria-label="Ticket sections">
          <button type="button" class="tab-button inactive">Buy a ticket</button>
          <button type="button" class="tab-button active">Your tickets</button>
        </nav>

        <main class="content">
          <section class="ticket-card" aria-label="Season ticket">
            <span class="side-notch notch-left" aria-hidden="true"></span>
            <span class="side-notch notch-right" aria-hidden="true"></span>

            <div class="qr-code" id="qrCode" aria-hidden="true"></div>

            <div class="ticket-meta">
              <div class="ticket-number"><strong>011901</strong> 58574529</div>
              <div class="subscription-badge">
                <svg viewBox="0 0 32 32" aria-hidden="true">
                  <path d="M18.2 3.2h-4.4l-.8 4a10.2 10.2 0 0 0-2.1.9L7.5 5.9 4.4 9l2.2 3.4c-.4.7-.7 1.4-.9 2.2l-4 .7v4.4l4 .8c.2.8.5 1.5.9 2.2l-2.2 3.4 3.1 3.1 3.4-2.2c.7.4 1.4.7 2.1.9l.8 4h4.4l.8-4c.7-.2 1.4-.5 2.1-.9l3.4 2.2 3.1-3.1-2.2-3.4c.4-.7.7-1.4.9-2.2l4-.8v-4.4l-4-.7c-.2-.8-.5-1.5-.9-2.2L27.6 9l-3.1-3.1-3.4 2.2c-.7-.4-1.4-.7-2.1-.9l-.8-4Zm-2.2 9a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Z" />
                  <circle cx="16" cy="16" r="2.1" class="gear-hole" />
                </svg>
                <span>SUBSCRIPTION</span>
              </div>
            </div>

            <div class="divider"></div>

            <div class="ticket-title">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 2h2v3H6V2Zm8 0h2v3h-2V2Z" />
                <path d="M4.3 4h17.4c.7 0 1.3.6 1.3 1.3v17.4c0 .7-.6 1.3-1.3 1.3H4.3c-.7 0-1.3-.6-1.3-1.3V5.3C3 4.6 3.6 4 4.3 4Zm1.4 7.2h3v3h-3v-3Zm4.7 0h3v3h-3v-3Zm4.7 0h3v3h-3v-3Zm-9.4 4.5h3v3h-3v-3Zm4.7 0h3v3h-3v-3Zm4.7 0h3v3h-3v-3ZM5 8h18V6.5H5V8Z" />
              </svg>
              <span><strong>SEASON TICKET</strong><span class="title-rest"> - Auto-renewing s...</span></span>
            </div>

            <div class="divider title-divider"></div>

            <div class="details-row">
              <div>
                <p class="label">Valid</p>
                <p class="value status-value"><span></span>Until further notice</p>
              </div>
              <div class="customer">
                <p class="label">Customer group</p>
                <p class="value">Adult</p>
              </div>
            </div>

            <div class="zone-card" id="zoneCard">
              <svg class="zone-pattern" viewBox="0 0 200 200" aria-hidden="true">
                <g class="zone-pattern-spin">
                  <polygon points="100 38 144 56 162 100 144 144 100 162 56 144 38 100 56 56" />
                  <g transform="translate(100 24)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(154 46) rotate(45)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(176 100) rotate(90)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(154 154) rotate(135)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(100 176) rotate(180)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(46 154) rotate(225)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(24 100) rotate(270)">
                    <ellipse rx="10" ry="18" />
                  </g>
                  <g transform="translate(46 46) rotate(315)">
                    <ellipse rx="10" ry="18" />
                  </g>
                </g>
              </svg>
              <div class="zone-color-panel">
              </div>
              <div class="zone-copy">
                <div class="zone-letters">AB</div>
                <div class="zone-label">
                  <span>i</span>
                  Zones
                </div>
              </div>
            </div>
          </section>

          <section class="friend-ticket">
            <p>Do you need a ticket for a friend,<br />too?</p>
            <button type="button">Buy a new ticket</button>
          </section>

          <div class="lower-divider"></div>
          <p class="previous-copy">Previous purchases of tickets</p>
          <a class="purchase-history" href="#" aria-label="Open purchase history">Purchase history ›</a>
          <div class="color-controls" aria-label="Zone background color">
            <button type="button" class="color-button is-selected" data-zone-color="#357fca" aria-label="Blue background"></button>
            <button type="button" class="color-button red" data-zone-color="#d84a3f" aria-label="Red background"></button>
            <button type="button" class="color-button green" data-zone-color="#30a95a" aria-label="Green background"></button>
            <button type="button" class="color-button yellow" data-zone-color="#e8b72e" aria-label="Yellow background"></button>
          </div>
        </main>

        <footer class="bottom-nav" aria-label="Main navigation">
          <button type="button">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M3.5 15.3 16 3.8l12.5 11.5-2.3 2.5-2-1.8v11.7H7.8V16l-2 1.8-2.3-2.5Z" />
              <path d="M13 20.2h6v7.5h-6v-7.5Z" class="cutout" />
              <path d="M9.6 22.1h3v3h-3v-3Zm9.4 0h3v3h-3v-3Z" class="cutout" />
            </svg>
            <span>HOME</span>
          </button>
          <button type="button" class="selected">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M7 5.3h13.2v18.2H7V5.3Zm3.3 5.3h6.8v2h-6.8v-2Zm0 4.5h6.8v2h-6.8v-2Zm0 4.5h4.7v2h-4.7v-2Z" />
              <path d="M14.4 10.2h10.7v16.5H14.4V10.2Zm2.5 4.1h5.5v1.7h-5.5v-1.7Zm0 3.9h5.5v1.7h-5.5v-1.7Zm0 3.9h3.7v1.7h-3.7v-1.7Z" opacity=".92" />
              <path d="M8.7 4.1h2.2v3.4H8.7V4.1Zm3.7 0h2.2v3.4h-2.2V4.1Z" />
              <circle cx="10.1" cy="8.1" r="1.15" class="cutout" />
              <circle cx="13.8" cy="8.1" r="1.15" class="cutout" />
              <path d="M20.6 10.2v3.3h-3.4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.7" />
            </svg>
            <span>TICKETS</span>
          </button>
          <button type="button">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M10.2 4.8A5.7 5.7 0 0 0 4.5 10.5c0 4.7 5.7 10.2 5.7 10.2s5.7-5.5 5.7-10.2a5.7 5.7 0 0 0-5.7-5.7Zm0 7.5a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8Zm14.2-6.2a4.7 4.7 0 0 0-4.7 4.7c0 3.9 4.7 8.5 4.7 8.5s4.7-4.6 4.7-8.5a4.7 4.7 0 0 0-4.7-4.7Zm0 6.2a1.55 1.55 0 1 1 0-3.1 1.55 1.55 0 0 1 0 3.1Z" />
              <path d="M10.9 24.7c2.4-2.6 5-2.8 7.6-.5 2.7 2.4 5.4 2.1 8.2-.8" fill="none" stroke="currentColor" stroke-dasharray="2.1 2.4" stroke-linecap="round" stroke-width="2.2" />
            </svg>
            <span>ROUTES</span>
          </button>
          <button type="button">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M5.4 7.1h21.2v3.3H5.4V7.1Zm0 8.8h21.2v3.3H5.4v-3.3Zm0 8.8h21.2V28H5.4v-3.3Z" />
            </svg>
            <span>MORE</span>
          </button>
        </footer>
      </div>
    </div>

    <script>
      const qr = document.getElementById("qrCode");
      const size = 45;
      const black = new Set();

      function addFinder(startX, startY) {
        for (let y = 0; y < 7; y += 1) {
          for (let x = 0; x < 7; x += 1) {
            const edge = x === 0 || x === 6 || y === 0 || y === 6;
            const center = x >= 2 && x <= 4 && y >= 2 && y <= 4;
            if (edge || center) black.add(`${startX + x},${startY + y}`);
          }
        }
      }

      addFinder(0, 0);
      addFinder(size - 7, 0);
      addFinder(0, size - 7);

      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          const nearFinder =
            (x < 8 && y < 8) ||
            (x > size - 9 && y < 8) ||
            (x < 8 && y > size - 9);
          if (!nearFinder) {
            const value = (x * 17 + y * 31 + x * y * 7 + (x % 5) * 13 + (y % 7) * 11) % 29;
            if (value < 13 || (x + y) % 9 === 0 || (x * y) % 23 === 3 || (x * 3 + y * 5) % 31 === 4) {
              black.add(`${x},${y}`);
            }
          }
          const cell = document.createElement("span");
          if (black.has(`${x},${y}`)) cell.className = "is-dark";
          qr.appendChild(cell);
        }
      }

      document.querySelectorAll(".color-button").forEach((button) => {
        button.addEventListener("click", () => {
          document.documentElement.style.setProperty("--zone-color", button.dataset.zoneColor);
          document.querySelectorAll(".color-button").forEach((item) => item.classList.remove("is-selected"));
          button.classList.add("is-selected");
        });
      });
    </script>
  </body>
</html>
