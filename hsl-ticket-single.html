<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSL Ticket Mockup</title>
    <meta name="theme-color" content="#f4f4f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HSL" />
    <link rel="manifest" href="./manifest.webmanifest?v=21" />
    <link rel="icon" href="./assets/icons/hsl-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/hsl-icon.svg" />
    <style>
* {
  box-sizing: border-box;
}

:root {
  --zone-color: #357fca;
  --zone-pattern-size: min(430px, 100vw);
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background: #d7d7d7;
  color: #353538;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}

button {
  border: 0;
  font: inherit;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: stretch;
}

.app-screen {
  position: relative;
  width: min(100vw, 430px);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #f4f4f4;
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
}

.ticket-tabs {
  position: relative;
  z-index: 2;
  height: 46px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: end;
  border-bottom: 1px solid #d9d9d9;
  background: #fff;
}

.tab-button {
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 1px;
  background: transparent;
  color: #2f2f34;
  font-size: 16px;
  font-weight: 800;
}

.tab-button.inactive {
  color: #347dca;
}

.tab-button.active {
  position: relative;
}

.tab-button.active::after {
  content: "";
  position: absolute;
  right: 14px;
  bottom: -1px;
  left: 20px;
  height: 3px;
  background: #347dca;
}

.content {
  height: calc(100% - 46px);
  overflow-y: auto;
  padding: 15px 15px 146px;
  background: #f4f4f4;
  scrollbar-color: #8a8a8a transparent;
  scrollbar-width: thin;
}

.ticket-card {
  position: relative;
  padding: 49px 28px 24px;
  border: 1px solid #ddd;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 1px 7px rgba(0, 0, 0, 0.08);
}

.side-notch {
  position: absolute;
  top: 101px;
  z-index: 2;
  width: 29px;
  height: 29px;
  border-radius: 50%;
  background: #f4f4f4;
}

.side-notch::before {
  display: none;
}

.notch-left {
  left: -15px;
}

.notch-right {
  right: -15px;
}

.qr-code {
  width: 145px;
  height: 145px;
  margin: 0 auto 26px;
  background: #fff;
}

.qr-code svg {
  width: 100%;
  height: 100%;
  display: block;
  shape-rendering: crispEdges;
}

.qr-code path {
  fill: #333;
}

.ticket-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-bottom: 42px;
}

.ticket-number {
  white-space: nowrap;
  color: #38383d;
  font-size: 17px;
  line-height: 1;
}

.ticket-number strong {
  font-weight: 900;
}

.subscription-badge {
  height: 35px;
  min-width: 148px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 12px;
  border: 1px solid #dedede;
  border-radius: 5px;
  color: #347dca;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
}

.subscription-badge svg {
  width: 19px;
  height: 19px;
  fill: currentColor;
}

.subscription-badge .gear-hole {
  fill: #fff;
}

.divider,
.lower-divider {
  height: 1px;
  background: #dfdfdf;
}

.ticket-title {
  height: 48px;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  color: #37373a;
  background: #fff;
  font-size: 20px;
  font-weight: 400;
  white-space: nowrap;
}

.ticket-title svg {
  width: 18px;
  height: 18px;
  flex: 0 0 auto;
  fill: currentColor;
}

.ticket-title span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  background: transparent;
}

.ticket-title strong {
  font-weight: 900;
}

.ticket-title .title-rest {
  font-weight: 400;
}

.title-divider {
  margin-bottom: 12px;
}

.details-row {
  display: grid;
  grid-template-columns: 1fr 118px;
  align-items: start;
  margin-bottom: 14px;
}

.label {
  margin: 0 0 5px;
  color: #777;
  font-size: 16px;
  line-height: 1.1;
}

.value {
  margin: 0;
  color: #36363a;
  font-size: 20px;
  font-weight: 800;
  line-height: 1.2;
}

.status-value {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-value span {
  width: 10px;
  height: 10px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: #76c340;
}

.customer {
  text-align: right;
}

.zone-card {
  position: relative;
  height: 132px;
  display: grid;
  grid-template-columns: 46% 54%;
  overflow: hidden;
  contain: paint;
  border-radius: 0 0 8px 8px;
  background: var(--zone-color);
}

.zone-color-panel {
  position: relative;
  z-index: 2;
}

.zone-pattern {
  position: absolute;
  z-index: 1;
  left: 50%;
  top: calc(var(--zone-pattern-size) * -0.58);
  width: var(--zone-pattern-size);
  height: var(--zone-pattern-size);
  transform: translate3d(-50%, 0, 0) rotate(0turn);
  transform-box: fill-box;
  transform-origin: 50% 50%;
  will-change: transform;
  backface-visibility: hidden;
  pointer-events: none;
  overflow: visible;
  fill: none;
  stroke: #fff;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 17;
  animation: zone-spin 7s linear infinite;
}

.zone-pattern polygon,
.zone-pattern ellipse {
  vector-effect: non-scaling-stroke;
}

@keyframes zone-spin {
  to {
    transform: translate3d(-50%, 0, 0) rotate(1turn);
  }
}

@media (prefers-reduced-motion: reduce) {
  .zone-pattern {
    animation: none;
  }
}

.zone-copy {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(249, 249, 251, 0.985);
}

.zone-letters {
  position: relative;
  z-index: 1;
  width: 141.616px;
  height: 58.5px;
  display: block;
  flex: 0 0 auto;
  margin-top: 6px;
  color: #333;
  overflow: visible;
}

.zone-letters path {
  stroke: currentColor;
  stroke-width: 0.75px;
  stroke-linejoin: round;
  paint-order: stroke fill;
}

.zone-label {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  color: #347dca;
  font-size: 17px;
  font-weight: 400;
}

.zone-label span {
  width: 18px;
  height: 18px;
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
  background: #347dca;
  color: #fff;
  font-size: 14px;
  font-weight: 900;
  line-height: 1;
}

.friend-ticket {
  padding: 21px 10px 8px;
  text-align: center;
}

.friend-ticket p {
  margin: 0 0 16px;
  color: #444448;
  font-size: 20px;
  line-height: 1.2;
}

.friend-ticket button {
  width: min(272px, 80%);
  height: 49px;
  border-radius: 25px;
  background: #347dca;
  color: #fff;
  font-size: 21px;
  font-weight: 800;
}

.lower-divider {
  width: 82%;
  margin: 7px auto 0;
}

.previous-copy {
  margin: 22px 0 0;
  color: #444448;
  text-align: center;
  font-size: 20px;
  line-height: 1.2;
}

.purchase-history {
  display: block;
  margin: 18px 0 22px;
  color: #0786c8;
  text-align: center;
  text-decoration: none;
  font-size: 24px;
  font-weight: 800;
  line-height: 1.2;
}

.color-controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px clamp(6px, 2vw, 10px);
  margin: 0 0 96px;
}

.color-button {
  width: 34px;
  height: 34px;
  border: 3px solid #fff;
  border-radius: 50%;
  background: #357fca;
  box-shadow: 0 0 0 1px #d4d4d4;
}

.color-button.red {
  background: #d84a3f;
}

.color-button.cyan {
  background: #02b8e5;
}

.color-button.magenta {
  background: #dc0451;
}

.color-button.purple {
  background: #8c4798;
}

.color-button.orange {
  background: #f36a25;
}

.color-button.green {
  background: #30a95a;
}

.color-button.bright-yellow {
  background: #fed200;
}

.color-button.yellow {
  background: #e8b72e;
}

.color-button.is-selected {
  box-shadow: 0 0 0 3px #347dca;
}

.bottom-nav {
  position: absolute;
  z-index: 4;
  right: 0;
  bottom: 0;
  left: 0;
  height: 88px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid #cfcfcf;
  background: #fff;
}

.bottom-nav button {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: transparent;
  color: #6b6b6f;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0;
}

.bottom-nav svg {
  width: 32px;
  height: 32px;
  fill: currentColor;
}

.bottom-nav .selected {
  color: #347dca;
}

.bottom-nav .cutout {
  fill: #fff;
}

@media (max-width: 390px) {
  .ticket-card {
    padding-left: 22px;
    padding-right: 22px;
  }

  .ticket-meta {
    gap: 5px;
  }

  .ticket-number {
    font-size: 15px;
  }

  .subscription-badge {
    min-width: 137px;
    padding: 0 8px;
    font-size: 12px;
  }

  .ticket-title {
    font-size: 18px;
  }

  .value {
    font-size: 18px;
  }
}

    </style>

              <path d="M10.2 4.8A5.7 5.7 0 0 0 4.5 10.5c0 4.7 5.7 10.2 5.7 10.2s5.7-5.5 5.7-10.2a5.7 5.7 0 0 0-5.7-5.7Zm0 7.5a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8Zm14.2-6.2a4.7 4.7 0 0 0-4.7 4.7c0 3.9 4.7 8.5 4.7 8.5s4.7-4.6 4.7-8.5a4.7 4.7 0 0 0-4.7-4.7Zm0 6.2a1.55 1.55 0 1 1 0-3.1 1.55 1.55 0 0 1 0 3.1Z" />
              <path d="M10.9 24.7c2.4-2.6 5-2.8 7.6-.5 2.7 2.4 5.4 2.1 8.2-.8" fill="none" stroke="currentColor" stroke-dasharray="2.1 2.4" stroke-linecap="round" stroke-width="2.2" />
            </svg>
            <span>ROUTES</span>
          </button>
          <button type="button">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M5.4 7.1h21.2v3.3H5.4V7.1Zm0 8.8h21.2v3.3H5.4v-3.3Zm0 8.8h21.2V28H5.4v-3.3Z" />
            </svg>
            <span>MORE</span>
          </button>
        </footer>
      </div>
    </div>

    <script>
      const qr = document.getElementById("qrCode");
      const size = 45;
      const black = new Set();

      function addFinder(startX, startY) {
        for (let y = 0; y < 7; y += 1) {
          for (let x = 0; x < 7; x += 1) {
            const edge = x === 0 || x === 6 || y === 0 || y === 6;
            const center = x >= 2 && x <= 4 && y >= 2 && y <= 4;
            if (edge || center) black.add(`${startX + x},${startY + y}`);
          }
        }
      }

      addFinder(0, 0);
      addFinder(size - 7, 0);
      addFinder(0, size - 7);

      const qrPath = [];
      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          const nearFinder =
            (x < 8 && y < 8) ||
            (x > size - 9 && y < 8) ||
            (x < 8 && y > size - 9);
          if (!nearFinder) {
            const value = (x * 17 + y * 31 + x * y * 7 + (x % 5) * 13 + (y % 7) * 11) % 29;
            if (value < 13 || (x + y) % 9 === 0 || (x * y) % 23 === 3 || (x * 3 + y * 5) % 31 === 4) {
              black.add(`${x},${y}`);
            }
          }
          if (black.has(`${x},${y}`)) qrPath.push(`M${x} ${y}h1v1h-1z`);
        }
      }

      const qrSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const qrShape = document.createElementNS("http://www.w3.org/2000/svg", "path");
      qrSvg.setAttribute("viewBox", `0 0 ${size} ${size}`);
      qrSvg.setAttribute("aria-hidden", "true");
      qrSvg.setAttribute("focusable", "false");
      qrShape.setAttribute("d", qrPath.join(""));
      qrSvg.appendChild(qrShape);
      qr.appendChild(qrSvg);

      const colorButtons = Array.from(document.querySelectorAll(".color-button"));
      const zoneColorStorageKey = "hsl-zone-color";
      const zoneColorAliases = {
        "#eb6e34": "#f36a25"
      };

      function loadZoneColor() {
        try {
          return localStorage.getItem(zoneColorStorageKey);
        } catch (error) {
          return null;
        }
      }

      function saveZoneColor(color) {
        try {
          localStorage.setItem(zoneColorStorageKey, color);
        } catch (error) {
          // Ignore storage failures; the color switcher still works for the current session.
        }
      }

      function applyZoneColor(button, shouldSave = true) {
        const color = button.dataset.zoneColor;
        document.documentElement.style.setProperty("--zone-color", color);
        colorButtons.forEach((item) => item.classList.remove("is-selected"));
        button.classList.add("is-selected");
        if (shouldSave) saveZoneColor(color);
      }

      const savedZoneColor = loadZoneColor();
      const normalizedSavedZoneColor = zoneColorAliases[savedZoneColor] || savedZoneColor;
      const savedColorButton = colorButtons.find((button) => button.dataset.zoneColor === normalizedSavedZoneColor);
      if (savedColorButton) applyZoneColor(savedColorButton, normalizedSavedZoneColor !== savedZoneColor);

      colorButtons.forEach((button) => {
        button.addEventListener("click", () => applyZoneColor(button));
      });

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js?v=21", { updateViaCache: "none" }).then((registration) => {
            registration.update();
          });
        });
      }
    </script>
  </body>
